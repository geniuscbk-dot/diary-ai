<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>육아일기 A.I.</title>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f7f4ef;
  --surface:#fdfcfa;
  --surface2:#f2ede8;
  --mint-deep:#4a8c7a;
  --mint-mid:#7ab5a5;
  --mint-soft:#c8e4de;
  --mint-pale:#e2f2ee;
  --mint-wash:#f0f8f6;
  --text:#1a1a1a;
  --text-soft:#3d3d3d;
  --text-muted:#7a9a92;
  --border:#c0ddd7;
  --shadow:0 4px 20px rgba(74,140,122,.08);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);background-image:radial-gradient(ellipse at 15% 15%,rgba(168,207,196,.2) 0%,transparent 55%),radial-gradient(ellipse at 85% 85%,rgba(200,228,222,.15) 0%,transparent 55%);color:var(--text);font-family:'Noto Sans KR',sans-serif;font-size:14px;line-height:1.6;min-height:100vh;}
header{background:rgba(247,251,250,.92);backdrop-filter:blur(10px);border-bottom:1px solid var(--border);padding:0 20px;height:56px;display:flex;align-items:center;justify-content:space-between;}
.logo{font-family:'Gowun Batang',serif;font-size:18px;font-weight:700;color:var(--mint-deep);}
.logo-sub{font-size:10px;color:var(--text-muted);margin-left:6px;}
.ai-badge{font-size:10px;font-weight:700;color:var(--mint-deep);background:var(--mint-pale);border:1px solid var(--mint-soft);padding:3px 10px;border-radius:20px;}
.main{padding:20px 16px 40px;max-width:480px;margin:0 auto;}
.intro{text-align:center;padding:20px 16px 22px;background:#fff;border-radius:16px;margin-bottom:12px;border:1px solid var(--border);box-shadow:var(--shadow);}
.intro-emoji{font-size:36px;margin-bottom:10px;display:block;animation:float 3s ease-in-out infinite;}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}
.intro-title{font-family:'Gowun Batang',serif;font-size:20px;color:var(--text);margin-bottom:5px;}
.intro-desc{font-size:12px;color:var(--text-muted);line-height:1.7;}
.card{background:var(--surface);border-radius:16px;padding:18px 16px;box-shadow:var(--shadow);border:1px solid var(--border);margin-bottom:12px;}
.card-title{font-size:11px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--mint-mid);margin-bottom:14px;display:flex;align-items:center;gap:6px;}

/* 사진 3칸 */
.photo-slots{display:flex;gap:8px;}
.photo-slot{flex:1;display:flex;flex-direction:column;gap:6px;}
.photo-slot-label{font-size:10px;font-weight:700;color:var(–mint-deep);text-align:center;line-height:1.3;}
.photo-slot-sub{font-size:9px;color:var(–text-muted);text-align:center;line-height:1.3;margin-top:-2px;}
.photo-slot-area{
aspect-ratio:1;
border:2px dashed var(–mint-soft);
border-radius:10px;
background:linear-gradient(135deg,var(–mint-pale),var(–mint-wash));
display:flex;align-items:center;justify-content:center;
cursor:pointer;
overflow:hidden;
transition:all .2s;
position:relative;
}
.photo-slot-area:active{border-color:var(–mint-deep);}
.photo-slot-area.filled{border-style:solid;border-color:var(–mint-mid);}
.photo-slot-area img{width:100%;height:100%;object-fit:cover;}
.photo-slot-empty{font-size:22px;color:var(–mint-light);}
.photo-slot-area input[type=file]{display:none;}

/* 날짜 */
.date-label{display:block;position:relative;cursor:pointer;}
.date-input-real{position:absolute;top:0;left:0;width:100%;height:100%;opacity:0;cursor:pointer;z-index:2;}
.date-display{
width:100%;
border:1.5px solid #c0ddd7;
border-radius:10px;
padding:10px 14px;
font-size:14px;
font-family:‘Noto Sans KR’,sans-serif;
background:#f0f8f6;
display:flex;align-items:center;justify-content:space-between;
color:#7a9a92;
transition:border .15s;
}
.date-display.has-value{color:#1a1a1a;border-color:#7ab5a5;}

.form-group{margin-bottom:14px;}
.form-group:last-child{margin-bottom:0;}
.form-label{font-size:11px;font-weight:700;color:var(–text-soft);margin-bottom:6px;display:block;}
.form-input{width:100%;border:1px solid var(–border);border-radius:10px;padding:10px 14px;font-size:14px;font-family:‘Noto Sans KR’,sans-serif;color:var(–text);background:var(–mint-wash);outline:none;transition:all .15s;-webkit-appearance:none;appearance:none;}
.form-input:focus{border-color:var(–mint-mid);background:#fff;box-shadow:0 0 0 3px rgba(122,181,165,.12);}
textarea.form-input{resize:none;height:68px;line-height:1.5;}

/* 무드 버튼 — 기본 민트, 선택시 회색 */
.tone-options{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;}
.tone-btn{
padding:10px 4px;
border-radius:12px;
border:1px solid var(–mint-soft);
font-size:11px;font-weight:500;
background:var(–mint-pale);
color:var(–mint-deep);
font-family:‘Noto Sans KR’,sans-serif;
text-align:center;line-height:1.4;
cursor:pointer;
-webkit-tap-highlight-color:rgba(74,140,122,.2);
transition:background .15s,color .15s,border-color .15s;
user-select:none;
display:block;width:100%;
}
.tone-btn.active{
background:#4a8c7a;
color:#fff;
border-color:#4a8c7a;
box-shadow:0 2px 8px rgba(74,140,122,.3);
}
.generate-btn{
width:100%;padding:15px;border-radius:14px;border:none;
background:#4a8c7a !important;
color:#fff !important;font-size:15px;font-weight:700;
font-family:‘Noto Sans KR’,sans-serif;
cursor:pointer;transition:all .2s;margin-bottom:20px;
box-shadow:0 4px 16px rgba(74,140,122,.3);
}
.generate-btn:active{opacity:.85;}
.generate-btn:disabled{background:#a8cfc4 !important;box-shadow:none;}
.divider{display:flex;align-items:center;gap:10px;margin:4px 0 14px;color:var(–text-muted);font-size:11px;}
.divider::before,.divider::after{content:’’;flex:1;height:1px;background:var(–border);}
.writer-btn{flex:1;padding:8px 2px;border-radius:10px;border:1px solid #c8e4de;font-size:11px;font-weight:500;background:#e2f2ee;color:#4a8c7a;font-family:‘Noto Sans KR’,sans-serif;text-align:center;cursor:pointer;transition:all .15s;user-select:none;-webkit-tap-highlight-color:rgba(74,140,122,.2);}
.writer-btn.active{background:#4a8c7a;color:#fff;border-color:#4a8c7a;}

/* 결과 */
.result-section{background:var(–surface);border-radius:16px;padding:22px 18px;box-shadow:var(–shadow);border:1px solid var(–border);display:none;}
.result-section.show{display:block;animation:fadeUp .4s ease;}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.result-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(–border);}
.result-title{font-family:‘Gowun Batang’,serif;font-size:14px;color:#4a8c7a;}
.copy-btn{padding:5px 12px;border-radius:6px;border:1px solid #c8e4de;background:#e2f2ee;color:#4a8c7a;font-size:11px;font-weight:700;cursor:pointer;font-family:‘Noto Sans KR’,sans-serif;}

/* 사진 카드 */
.diary-card{background:#fff;border-radius:16px;overflow:hidden;border:1px solid #e8e3db;margin-bottom:14px;box-shadow:0 2px 12px rgba(0,0,0,.06);}
.diary-photos{display:grid;grid-template-columns:repeat(3,1fr);gap:2px;}
.diary-photo{aspect-ratio:1;overflow:hidden;}
.diary-photo img{width:100%;height:100%;object-fit:cover;display:block;}
.diary-photo-empty{width:100%;height:100%;background:#f5f5f5;display:flex;align-items:center;justify-content:center;font-size:20px;color:#ccc;}
.diary-card-body{padding:16px;}
.diary-card-date{font-size:11px;color:#7a9a92;margin-bottom:8px;}
.diary-card-text{font-family:‘Gowun Batang’,serif;font-size:14px;line-height:1.9;color:#1a1a1a;white-space:pre-wrap;}
.diary-card-footer{padding:10px 16px;border-top:1px solid #f0f0f0;display:flex;justify-content:flex-end;}
.diary-card-tag{font-size:10px;color:#7ab5a5;font-weight:700;}

/* 로딩 */
.loading-overlay{display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(247,244,239,.92);backdrop-filter:blur(4px);z-index:100;flex-direction:column;align-items:center;justify-content:center;gap:16px;}
.loading-overlay.show{display:flex;}
.loading-emoji{font-size:40px;animation:pulse 1.5s ease-in-out infinite;}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.1)}}
.loading-text{font-family:‘Gowun Batang’,serif;font-size:16px;color:var(–text);text-align:center;line-height:1.7;}
.loading-sub{font-size:12px;color:var(–text-muted);font-family:‘Noto Sans KR’,sans-serif;}
</style>

</head>
<body>
<header>
  <div><span class="logo">육아일기 A.I.</span><span class="logo-sub">by 조병근</span></div>
  <div class="ai-badge">✨ AI 작성</div>
</header>
<div class="main">

  <div class="intro">
    <span class="intro-emoji">👶</span>
    <div class="intro-title">오늘 하루를 기록해요</div>
    <div class="intro-desc">사진과 몇 가지 메모만 있으면<br>AI가 따뜻한 육아일기를 써드려요</div>
  </div>

  <!-- 사진 3칸 -->

  <div class="card">
    <div class="card-title">📸 오늘의 사진</div>
    <div class="photo-slots">
      <div class="photo-slot">
        <div class="photo-slot-label">오늘의 시작</div>
        <div class="photo-slot-sub">하루의 첫 페이지</div>
        <label class="photo-slot-area" id="slot0" for="photo0">
          <span class="photo-slot-empty" id="empty0">+</span>
        </label>
        <input type="file" id="photo0" accept="image/*" style="display:none;">
      </div>
      <div class="photo-slot">
        <div class="photo-slot-label">오늘의 하이라이트</div>
        <div class="photo-slot-sub">가장 빛났던 순간</div>
        <label class="photo-slot-area" id="slot1" for="photo1">
          <span class="photo-slot-empty" id="empty1">+</span>
        </label>
        <input type="file" id="photo1" accept="image/*" style="display:none;">
      </div>
      <div class="photo-slot">
        <div class="photo-slot-label">오늘의 마무리</div>
        <div class="photo-slot-sub">하루를 마치며</div>
        <label class="photo-slot-area" id="slot2" for="photo2">
          <span class="photo-slot-empty" id="empty2">+</span>
        </label>
        <input type="file" id="photo2" accept="image/*" style="display:none;">
      </div>
    </div>
  </div>

  <!-- 기록 -->

  <div class="card">
    <div class="card-title">✏️ 오늘의 기록</div>
    <div class="form-group">
      <label class="form-label">날짜</label>
      <label class="date-label">
        <input type="date" class="date-input-real" id="diaryDate">
        <div class="date-display" id="dateDisplay">
          <span id="dateTxt">클릭해서 날짜를 선택해요</span>
          <span>📅</span>
        </div>
      </label>
    </div>
    <div class="form-group">
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
        <div>
          <label class="form-label">아이 이름</label>
          <input type="text" class="form-input" id="childName" placeholder="예: 성하">
        </div>
        <div>
          <label class="form-label">일기 쓰는 사람</label>
          <div style="display:flex;gap:5px;">
            <button type="button" class="writer-btn active" data-writer="아빠">👨 아빠</button>
            <button type="button" class="writer-btn" data-writer="엄마">👩 엄마</button>
            <button type="button" class="writer-btn writer-custom" id="writerCustomBtn">✏️ 직접</button>
          </div>
          <input type="text" class="form-input" id="writerCustomInput" placeholder="입력하기" style="display:none;margin-top:6px;">
        </div>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">어디서 놀았나요?</label>
      <input type="text" class="form-input" id="diaryPlace" placeholder="예: 서울대공원 동물원">
    </div>
  </div>

  <!-- 스타일 -->

  <div class="card">
    <div class="card-title">🎨 일기 스타일</div>
    <div class="form-group">
      <label class="form-label">오늘의 무드 <span style="color:var(--text-muted);font-weight:400">(최대 2개)</span></label>
      <div class="tone-options">
        <button type="button" class="tone-btn active" data-tone="따뜻하고 포근하게">🌸 따뜻하게</button>
        <button type="button" class="tone-btn" data-tone="유머러스하고 재미있게">😄 재미있게</button>
        <button type="button" class="tone-btn" data-tone="감성적이고 시적으로">🌙 감성적으로</button>
        <button type="button" class="tone-btn" data-tone="짧고 간결하게">✏️ 간결하게</button>
        <button type="button" class="tone-btn" data-tone="뭉클하고 눈물나게">🥹 뭉클하게</button>
        <button type="button" class="tone-btn" data-tone="잔잔하고 평화롭게">🌿 잔잔하게</button>
        <button type="button" class="tone-btn" data-tone="쿨하고 담백하게">😎 쿨하게</button>
        <button type="button" class="tone-btn" data-tone="동화처럼 신비롭게">📖 동화처럼</button>
        <button type="button" class="tone-btn" data-tone="편지처럼 다정하게">💌 편지처럼</button>
      </div>
    </div>
    <div class="divider">선택사항</div>
    <div class="form-group">
      <label class="form-label">아이에게 해줄 말이 있나요? <span style="color:var(--text-muted);font-weight:400">(선택)</span></label>
      <textarea class="form-input" id="diaryExclude" placeholder="예: 오늘 정말 잘 걸었어. 많이 컸구나 😊"></textarea>
    </div>
  </div>

<button type="button" class="generate-btn" id="generateBtn">✨ 육아일기 만들기</button>

  <div class="result-section" id="resultSection">
    <div class="result-header">
      <span class="result-title">📖 오늘의 육아일기</span>
      <div style="display:flex;gap:6px;">
        <button type="button" class="copy-btn" id="copyBtn">복사</button>
        <button type="button" class="copy-btn" id="shareBtn" style="background:#4a8c7a;color:#fff;border-color:#4a8c7a;">공유</button>
      </div>
    </div>
    <div class="diary-card" id="diaryCard">
      <div class="diary-photos" id="diaryPhotos"></div>
      <div class="diary-card-body">
        <div class="diary-card-date" id="resultDate"></div>
        <div class="diary-card-text" id="resultText"></div>
      </div>
      <div class="diary-card-footer">
        <span class="diary-card-tag">육아일기 A.I. by 조병근</span>
      </div>
    </div>
  </div>
</div>

<div class="loading-overlay" id="loadingOverlay">
  <div class="loading-emoji">✍️</div>
  <div class="loading-text">AI가 일기를 쓰고 있어요</div>
  <div class="loading-sub">오늘 하루를 예쁘게 담을게요 😊</div>
</div>

<script>
var WORKER_URL = "https://diary-ai.byungkuen.workers.dev";
var photoBase64List = [null, null, null];
var selectedTones = ["따뜻하고 포근하게"];

// 작성자 버튼
var selectedWriter = "아빠";
document.querySelectorAll('.writer-btn').forEach(function(btn) {
  btn.addEventListener('click', function() {
    document.querySelectorAll('.writer-btn').forEach(function(b) { b.classList.remove('active'); });
    btn.classList.add('active');
    if(btn.id === 'writerCustomBtn') {
      document.getElementById('writerCustomInput').style.display = 'block';
      selectedWriter = '';
    } else {
      document.getElementById('writerCustomInput').style.display = 'none';
      selectedWriter = btn.getAttribute('data-writer');
    }
  });
});
document.getElementById('writerCustomInput').addEventListener('input', function() {
  selectedWriter = this.value;
});

// 날짜
document.getElementById('diaryDate').addEventListener('change', function() {
  var val = this.value;
  var display = document.getElementById('dateDisplay');
  var txt = document.getElementById('dateTxt');
  if(val) {
    txt.textContent = val.replace(/-/g, '.');
    display.classList.add('has-value');
  } else {
    txt.textContent = '클릭해서 날짜를 선택해요';
    display.classList.remove('has-value');
  }
});

// 사진 3칸
[0,1,2].forEach(function(i) {
  document.getElementById('photo' + i).addEventListener('change', function() {
    var file = this.files[0];
    if(!file) return;
    this.value = '';
    fileToBase64(file).then(function(b64) {
      photoBase64List[i] = b64;
      var slot = document.getElementById('slot' + i);
      slot.classList.add('filled');
      var empty = document.getElementById('empty' + i);
      if(empty) empty.style.display = 'none';
      var oldImg = slot.querySelector('img');
      var oldBadge = slot.querySelector('.change-badge');
      if(oldImg) oldImg.remove();
      if(oldBadge) oldBadge.remove();
      var img = document.createElement('img');
      img.src = b64;
      img.style.cssText = 'width:100%;height:100%;object-fit:cover;position:absolute;top:0;left:0;pointer-events:none;';
      slot.appendChild(img);
      var badge = document.createElement('div');
      badge.className = 'change-badge';
      badge.textContent = '사진 변경 ✎';
      badge.style.cssText = 'position:absolute;bottom:6px;left:50%;transform:translateX(-50%);background:rgba(0,0,0,.55);color:#fff;font-size:11px;font-weight:700;padding:4px 10px;border-radius:8px;white-space:nowrap;pointer-events:none;';
      slot.appendChild(badge);
      if(i === 0) tryExtractDate(file);
    });
  });
});

function fileToBase64(file) {
  return new Promise(function(resolve) {
    var img = new Image();
    var reader = new FileReader();
    reader.onload = function(e) {
      img.onload = function() {
        var canvas = document.createElement('canvas');
        var maxSize = 1024;
        var w = img.width, h = img.height;
        if(w > maxSize || h > maxSize) {
          if(w > h) { h = Math.round(h * maxSize / w); w = maxSize; }
          else { w = Math.round(w * maxSize / h); h = maxSize; }
        }
        canvas.width = w; canvas.height = h;
        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
        resolve(canvas.toDataURL('image/jpeg', 0.7));
      };
      img.src = e.target.result;
    };
    reader.readAsDataURL(file);
  });
}

function tryExtractDate(file) {
  var d = new Date(file.lastModified);
  var s = d.toISOString().split('T')[0];
  if(s) {
    document.getElementById('diaryDate').value = s;
    document.getElementById('dateTxt').textContent = s.replace(/-/g, '.');
    document.getElementById('dateDisplay').classList.add('has-value');
  }
}

// 무드 버튼
document.querySelector('.tone-options').addEventListener('touchend', function(e) {
  e.preventDefault();
  var btn = e.target.closest('.tone-btn');
  if(btn) handleTone(btn);
});
document.querySelector('.tone-options').addEventListener('click', function(e) {
  var btn = e.target.closest('.tone-btn');
  if(btn) handleTone(btn);
});

function handleTone(btn) {
  var tone = btn.getAttribute('data-tone');
  var idx = selectedTones.indexOf(tone);
  if(idx > -1) {
    if(selectedTones.length > 1) {
      selectedTones.splice(idx, 1);
      btn.classList.remove('active');
    }
  } else {
    if(selectedTones.length >= 2) {
      var firstTone = selectedTones.shift();
      document.querySelectorAll('.tone-btn').forEach(function(b) {
        if(b.getAttribute('data-tone') === firstTone) b.classList.remove('active');
      });
    }
    selectedTones.push(tone);
    btn.classList.add('active');
  }
}

// 생성
document.getElementById('generateBtn').addEventListener('click', function() {
  var validPhotos = photoBase64List.filter(function(p) { return p !== null; });
  if(validPhotos.length < 3) { alert('사진 3장을 모두 선택해주세요! 📸'); return; }
  var place = document.getElementById('diaryPlace').value;
  if(!place) { alert('장소를 입력해주세요!'); return; }
  var date = document.getElementById('diaryDate').value;

  document.getElementById('loadingOverlay').classList.add('show');
  document.getElementById('generateBtn').disabled = true;

  var childName = document.getElementById('childName').value || '아이';
  var writer = selectedWriter || document.getElementById('writerCustomInput').value || '부모';
  var message = document.getElementById('diaryExclude').value;

  var prompt = '아이와 함께한 하루를 육아일기로 써줘.\n\n' +
    '날짜: ' + (date || '미입력') + '\n' +
    '아이 이름: ' + childName + '\n' +
    '일기 쓰는 사람: ' + writer + '\n' +
    '장소: ' + (place || '미입력') + '\n' +
    '톤: ' + selectedTones.join(', ') + '\n' +
    (message ? '아이에게 해줄 말: ' + message + '\n' : '') +
    '\n사진은 순서대로 [하루의 첫 페이지, 가장 빛났던 순간, 하루를 마치며] 순간이야.\n' +
    '각 사진의 아이 표정, 행동, 분위기를 묘사하고 스토리라인으로 연결해줘.\n' +
    writer + '가 ' + childName + '에게 그날을 추억하며 들려주는 이야기 형식으로 써줘.\n' +
    '예: "' + childName + '야, ' + writer + '는 오늘 ' + childName + '와 함께해서 너무 행복했어!" 같은 말투로.\n' +
    (message ? '일기 마지막에 아이에게 해줄 말도 자연스럽게 녹여줘: "' + message + '"\n' : '') +
    selectedTones.join(', ') + ' 톤으로 400자 내외로 써줘.\n' +
    '감동적인 제목도 붙여줘.\n마지막에 오늘 하루를 한 문장으로 요약해줘.';

  var imgs = validPhotos.map(function(b64) {
    var mt = b64.split(';')[0].split(':')[1];
    return { type: "image", source: { type: "base64", media_type: mt, data: b64.split(',')[1] } };
  });
  var messages = [{ role: "user", content: imgs.concat([{ type: "text", text: prompt }]) }];

  fetch(WORKER_URL + "/", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({ messages: messages })
  })
  .then(function(res) { return res.json(); })
  .then(function(data) {
    var diary = data.diary || data.error || "일기 생성에 실패했습니다.";
    document.getElementById('resultText').textContent = diary;
    document.getElementById('resultDate').textContent = (date || '').replace(/-/g, '.') + '  |  ' + (childName) + ' · ' + writer;

    // 사진 카드에 넣기
    var photosEl = document.getElementById('diaryPhotos');
    photosEl.innerHTML = '';
    photoBase64List.forEach(function(b64) {
      var div = document.createElement('div');
      div.className = 'diary-photo';
      if(b64) {
        var img = document.createElement('img');
        img.src = b64;
        div.appendChild(img);
      } else {
        div.innerHTML = '<div class="diary-photo-empty">📷</div>';
      }
      photosEl.appendChild(div);
    });

    document.getElementById('resultSection').classList.add('show');
    document.getElementById('resultSection').scrollIntoView({ behavior: 'smooth', block: 'start' });
  })
  .catch(function() { alert('오류가 발생했습니다. 다시 시도해주세요.'); })
  .finally(function() {
    document.getElementById('loadingOverlay').classList.remove('show');
    document.getElementById('generateBtn').disabled = false;
  });
});

// 복사
document.getElementById('copyBtn').addEventListener('click', function() {
  var text = document.getElementById('resultText').textContent;
  navigator.clipboard.writeText(text).then(function() {
    var btn = document.getElementById('copyBtn');
    btn.textContent = '✅ 됐어요';
    setTimeout(function() { btn.textContent = '복사'; }, 2000);
  });
});

// 공유
document.getElementById('shareBtn').addEventListener('click', function() {
  var text = document.getElementById('resultText').textContent;
  var date = document.getElementById('resultDate').textContent;
  var childName = document.getElementById('childName').value || '아이';
  var title = childName + '의 육아일기 — ' + date;
  if(navigator.share) {
    navigator.share({ title: title, text: text })
    .catch(function() {});
  } else {
    navigator.clipboard.writeText(text).then(function() {
      var btn = document.getElementById('shareBtn');
      btn.textContent = '✅ 복사됐어요';
      setTimeout(function() { btn.textContent = '공유'; }, 2000);
    });
  }
});
</script>

</body>
</html>
